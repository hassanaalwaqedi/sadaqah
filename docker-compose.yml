##############################################################
# Sadaqah Platform — Docker Compose (Development)
##############################################################

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sadaqah-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      go-api:
        condition: service_healthy
      nextjs:
        condition: service_started
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: sadaqah-frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - frontend
    restart: unless-stopped

  # ── Go API Server ───────────────────────────────────────
  go-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: sadaqah-api
    environment:
      - APP_ENV=${APP_ENV:-development}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8080}
      - API_READ_TIMEOUT=${API_READ_TIMEOUT:-15s}
      - API_WRITE_TIMEOUT=${API_WRITE_TIMEOUT:-15s}
      - DATABASE_URL=postgres://${DB_USER:-sadaqah}:${DB_PASSWORD:-sadaqah_dev_password}@postgres:5432/${DB_NAME:-sadaqah}?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-access-secret-change-in-production!!}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production!!}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-168h}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/serviceAccountKey.json
      - MINIO_BUCKET=${MINIO_BUCKET:-sadaqah-files}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - AI_INTERNAL_API_KEY=${AI_INTERNAL_API_KEY:-dev-internal-key}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM=${SMTP_FROM:-noreply@sadaqah.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  # ── FastAPI AI Worker ───────────────────────────────────
  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
      target: dev
    container_name: sadaqah-ai-worker
    environment:
      - APP_ENV=${APP_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - API_BASE_URL=http://go-api:8080
      - AI_INTERNAL_API_KEY=${AI_INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      redis:
        condition: service_healthy
      go-api:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sadaqah-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-sadaqah}
      POSTGRES_USER: ${DB_USER:-sadaqah}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sadaqah_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sadaqah}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sadaqah-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ── MinIO (S3-Compatible File Storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: sadaqah-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ── MailHog (Dev Email Testing) ─────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sadaqah-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - dev

  # ── pgAdmin (Dev Database Management) ──────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sadaqah-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sadaqah.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - dev

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
