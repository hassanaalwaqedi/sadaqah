name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.13' # from docker version
          cache: true
          cache-dependency-path: backend/go.sum
          
      - name: Go Format
        working-directory: ./backend
        run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi
        
      - name: Go Vet
        working-directory: ./backend
        run: go vet ./...
        
      - name: Run Tests
        working-directory: ./backend
        run: go test -v -cover ./...

      # Security scan using gosec
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
        env:
          GO111MODULE: on
        # Running from backend directory using action inputs isn't supported directly by this action sometimes,
        # so we run it manually or configure it
          
      - name: Run Gosec (Manual)
        working-directory: ./backend
        run: |
          curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.20.0
          $(go env GOPATH)/bin/gosec ./...

  frontend-test:
    name: Frontend Test (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
        
      - name: Type Check
        working-directory: ./frontend
        run: npm run type-check
        
      - name: Test
        working-directory: ./frontend
        run: npm run test

      - name: Audit Dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high

  ai-worker-test:
    name: AI Worker Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: ./ai-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black
          
      - name: Lint with Black
        working-directory: ./ai-worker
        run: black --check .
        
      - name: Lint with Flake8
        working-directory: ./ai-worker
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
      # - name: Test with pytest
      #   working-directory: ./ai-worker
      #   run: pytest
